<text x="72" y="414" class="tablehead">Smallest overlap counterexample and current boundary</text>
<text x="72" y="440">Smallest family with a runtime family gap: {{1,2}, {1,3}} at (p=3, k=2).</text>
<text x="72" y="460">Counts: raw=12, variable=8, family=11; bits=3.585/3.000/3.459.</text>
<text x="72" y="490">Same domain, different future family behavior:</text>
<text x="92" y="514">domain = [1]</text>
<text x="92" y="536">left = {1->(1, 2)}</text>
<text x="92" y="558">alternate = {1->(1, 3)}</text>
<text x="92" y="580">future = {3->(1, 3)}</text>
<text x="92" y="602">left future family = ((2,),)</text>
<text x="92" y="624">alternate future family = ((),)</text>
<text x="72" y="662">Tested summaries on this family:</text>
<text x="92" y="684">domain_only, edge_load_vector, edge_load_multiset, and residual_profile all fail.</text>
<text x="92" y="706">full_assignment is exact on the scan, so this quick push breaks the old coordinate law but does not yet force a genuinely global non-coordinate state.</text>
