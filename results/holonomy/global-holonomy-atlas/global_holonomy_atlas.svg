<text x="36" y="40" class="title">Global Holonomy Atlas</text>
<text x="36" y="64" class="subtitle">Classifying the first static and dynamic obstructions beyond simplex transport, then testing explicit compressed quotients inside the global layer.</text>
<text x="36" y="84" class="subtitle">Static = same assignment + pair + simplex, different now. Dynamic = same assignment + pair + simplex, same now, different future under a non-empty suffix.</text>
