<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="720" viewBox="0 0 1240 720">
  <defs>
    <filter id="panelShadow" x="-2%" y="-1%" width="104%" height="105%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="badgeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.2 0 0 0 0  0.8 0 0 0 0  0.5 0 0 0 0  0 0 0 0.3 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="60%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rangeBarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="breakCardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1520"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
    <!-- Connection line gradient (family → answer range) -->
    <linearGradient id="connGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  </style>

  <!-- ══════════════ BACKGROUND ══════════════ -->
  <rect width="1240" height="720" rx="8" fill="#0f1117"/>
  <rect x="0.5" y="0.5" width="1239" height="719" rx="8" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- ══════════════ HEADER ══════════════ -->
  <text x="52" y="40" font-size="24" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">Runtime Collapse Boundary</text>
  <rect x="52" y="48" width="150" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity="0.7"/>
  <text x="52" y="66" font-size="12" font-weight="400" fill="#94a3b8" letter-spacing="0.15">Complex contracts, simple runtime — 6,336 configurations tested, zero collapses</text>

  <!-- ══════════════ "0 FAILURES" BADGE (top right) ══════════════ -->
  <g transform="translate(1020, 18)" filter="url(#badgeGlow)">
    <rect x="0" y="0" width="172" height="52" rx="8" fill="#0d2818" stroke="#34d399" stroke-width="1.2" opacity="0.95"/>
    <text x="86" y="24" font-size="26" font-weight="800" fill="#34d399" letter-spacing="-1" text-anchor="middle">0 <tspan font-size="13" font-weight="600">failures</tspan></text>
    <text x="86" y="42" font-size="10" font-weight="400" fill="#6ee7b7" opacity="0.7" text-anchor="middle">across 6,336 antichain configs</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════════════════ -->
  <!-- LEFT PANEL: Scatter/Bar Chart                                             -->
  <!-- Panel: x=36..680, Chart area: x=120..650, y=130..560                     -->
  <!-- ══════════════════════════════════════════════════════════════════════════ -->
  <rect x="36" y="82" width="652" height="520" rx="10" fill="#1a1d27" filter="url(#panelShadow)"/>
  <rect x="36" y="82" width="652" height="520" rx="10" fill="none" stroke="#252a36" stroke-width="1"/>

  <!-- Panel title -->
  <text x="52" y="106" font-size="14" font-weight="700" fill="#e2e8f0">Current semantics: collapse holds</text>
  <text x="52" y="121" font-size="10" font-weight="400" fill="#64748b">Family bits vs answer-bit ranges across all exact antichain classes</text>

  <!-- Y axis grid lines (0-6 bits) -->
  <g font-size="9" font-weight="400" fill="#475569" text-anchor="end">
    <line x1="120" y1="560.0" x2="650" y2="560.0" stroke="#252a36" stroke-width="0.7"/>
    <text x="112" y="563.5">0</text>
    <line x1="120" y1="488.3" x2="650" y2="488.3" stroke="#252a36" stroke-width="0.5" stroke-dasharray="2,4"/>
    <text x="112" y="491.8">1</text>
    <line x1="120" y1="416.7" x2="650" y2="416.7" stroke="#252a36" stroke-width="0.5" stroke-dasharray="2,4"/>
    <text x="112" y="420.2">2</text>
    <line x1="120" y1="345.0" x2="650" y2="345.0" stroke="#252a36" stroke-width="0.5" stroke-dasharray="2,4"/>
    <text x="112" y="348.5">3</text>
    <line x1="120" y1="273.3" x2="650" y2="273.3" stroke="#252a36" stroke-width="0.5" stroke-dasharray="2,4"/>
    <text x="112" y="276.8">4</text>
    <line x1="120" y1="201.7" x2="650" y2="201.7" stroke="#252a36" stroke-width="0.5" stroke-dasharray="2,4"/>
    <text x="112" y="205.2">5</text>
    <line x1="120" y1="130.0" x2="650" y2="130.0" stroke="#252a36" stroke-width="0.7"/>
    <text x="112" y="133.5">6</text>
  </g>

  <!-- Y axis label -->
  <text x="46" y="345" font-size="10" font-weight="500" fill="#64748b" text-anchor="middle" transform="rotate(-90 46 345)">bits</text>

  <!-- X axis labels -->
  <g font-size="8.5" font-weight="500" fill="#94a3b8" text-anchor="middle"
     font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace, 'Inter', sans-serif">
    <text x="130" y="580">(2,1)</text>
    <text x="178" y="580">(2,2)</text>
    <text x="226" y="580">(3,1)</text>
    <text x="274" y="580">(3,2)</text>
    <text x="322" y="580">(3,3)</text>
    <text x="370" y="580">(4,1)</text>
    <text x="418" y="580">(4,2)</text>
    <text x="466" y="580">(4,3)</text>
    <text x="514" y="580">(5,1)</text>
    <text x="562" y="580">(5,2)</text>
    <text x="610" y="580">(5,3)</text>
  </g>
  <text x="370" y="596" font-size="10" font-weight="500" fill="#64748b" text-anchor="middle">(p, k) configuration</text>

  <!-- ═══ DATA: Connection lines (family dot → answer range) ═══ -->
  <!-- Thin vertical lines connecting family_bits dot to top of answer range -->
  <line x1="130" y1="393.6" x2="130" y2="446.4" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
  <!-- (2,2): family=answer, no connection needed -->
  <line x1="226" y1="332.8" x2="226" y2="446.4" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="274" y1="321.9" x2="274" y2="358.8" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
  <!-- (3,3): family=answer, no connection needed -->
  <line x1="370" y1="267.1" x2="370" y2="446.4" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="418" y1="261.2" x2="418" y2="303.1" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="466" y1="255.6" x2="466" y2="280.0" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="514" y1="198.5" x2="514" y2="446.4" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="562" y1="195.4" x2="562" y2="280.0" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="610" y1="192.4" x2="610" y2="223.2" stroke="#34d399" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>

  <!-- ═══ DATA: Answer bit range bars (coral) ═══ -->
  <!-- (2,1): [1.585, 1.585] — single point -->
  <line x1="130" y1="446.4" x2="130" y2="446.4" stroke="#f87171" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <circle cx="130" cy="446.4" r="3" fill="#f87171" opacity="0.9"/>

  <!-- (2,2): [2.585, 2.585] — single point -->
  <circle cx="178" cy="374.7" r="3" fill="#f87171" opacity="0.9"/>

  <!-- (3,1): [1.585, 1.585] — single point -->
  <circle cx="226" cy="446.4" r="3" fill="#f87171" opacity="0.9"/>

  <!-- (3,2): [2.585, 2.807] — range -->
  <rect x="272" y="358.8" width="4" height="15.9" rx="2" fill="url(#rangeBarGrad)"/>
  <circle cx="274" cy="358.8" r="2.5" fill="#f87171"/>
  <circle cx="274" cy="374.7" r="2.5" fill="#f87171"/>

  <!-- (3,3): [3.459, 3.459] — single point -->
  <circle cx="322" cy="312.1" r="3" fill="#f87171" opacity="0.9"/>

  <!-- (4,1): [1.585, 1.585] — single point -->
  <circle cx="370" cy="446.4" r="3" fill="#f87171" opacity="0.9"/>

  <!-- (4,2): [2.585, 3.585] — range -->
  <rect x="416" y="303.1" width="4" height="71.6" rx="2" fill="url(#rangeBarGrad)"/>
  <circle cx="418" cy="303.1" r="2.5" fill="#f87171"/>
  <circle cx="418" cy="374.7" r="2.5" fill="#f87171"/>

  <!-- (4,3): [3.459, 3.907] — range -->
  <rect x="464" y="280.0" width="4" height="32.1" rx="2" fill="url(#rangeBarGrad)"/>
  <circle cx="466" cy="280.0" r="2.5" fill="#f87171"/>
  <circle cx="466" cy="312.1" r="2.5" fill="#f87171"/>

  <!-- (5,1): [1.585, 1.585] — single point -->
  <circle cx="514" cy="446.4" r="3" fill="#f87171" opacity="0.9"/>

  <!-- (5,2): [2.585, 3.907] — range -->
  <rect x="560" y="280.0" width="4" height="94.7" rx="2" fill="url(#rangeBarGrad)"/>
  <circle cx="562" cy="280.0" r="2.5" fill="#f87171"/>
  <circle cx="562" cy="374.7" r="2.5" fill="#f87171"/>

  <!-- (5,3): [3.459, 4.700] — range -->
  <rect x="608" y="223.2" width="4" height="88.9" rx="2" fill="url(#rangeBarGrad)"/>
  <circle cx="610" cy="223.2" r="2.5" fill="#f87171"/>
  <circle cx="610" cy="312.1" r="2.5" fill="#f87171"/>

  <!-- ═══ DATA: Family bits dots (emerald) ═══ -->
  <g filter="url(#dotGlow)">
    <circle cx="130" cy="393.6" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="178" cy="374.7" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="226" cy="332.8" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="274" cy="321.9" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="322" cy="312.1" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="370" cy="267.1" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="418" cy="261.2" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="466" cy="255.6" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="514" cy="198.5" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="562" cy="195.4" r="5" fill="#34d399" opacity="0.95"/>
    <circle cx="610" cy="192.4" r="5" fill="#34d399" opacity="0.95"/>
  </g>

  <!-- ═══ ANTICHAIN COUNT LABELS (above each column) ═══ -->
  <g font-size="8" font-weight="600" fill="#64748b" text-anchor="middle"
     font-family="'SF Mono', 'Fira Code', monospace, 'Inter', sans-serif">
    <text x="130" y="384">1</text>
    <text x="178" y="365">1</text>
    <text x="226" y="323">1</text>
    <text x="274" y="312">7</text>
    <text x="322" y="303">1</text>
    <text x="370" y="258">1</text>
    <text x="418" y="252" fill="#94a3b8">63</text>
    <text x="466" y="246" fill="#94a3b8">49</text>
    <text x="514" y="189">1</text>
    <text x="562" y="186" fill="#e2e8f0" font-size="8.5">1,023</text>
    <text x="610" y="183" fill="#e2e8f0" font-size="8.5">5,188</text>
  </g>

  <!-- ═══ CHART LEGEND (inside left panel) ═══ -->
  <g transform="translate(480, 132)">
    <rect x="0" y="0" width="158" height="64" rx="5" fill="#12161e" stroke="#252a36" stroke-width="0.8"/>
    <circle cx="14" cy="15" r="4.5" fill="#34d399"/>
    <text x="24" y="18" font-size="9.5" font-weight="600" fill="#34d399">family bits</text>
    <text x="24" y="28" font-size="8" font-weight="400" fill="#64748b">contract complexity</text>
    <rect x="10" y="40" width="8" height="3" rx="1.5" fill="#f87171" opacity="0.85"/>
    <text x="24" y="45" font-size="9.5" font-weight="600" fill="#f87171">answer bit range</text>
    <text x="24" y="55" font-size="8" font-weight="400" fill="#64748b">runtime</text>
  </g>

  <!-- Antichain count explanation -->
  <text x="480" y="198" font-size="8" font-weight="400" fill="#475569">Numbers above dots = antichain count</text>

  <!-- ══════════════════════════════════════════════════════════════════════════ -->
  <!-- RIGHT PANEL: First Semantic Break                                         -->
  <!-- Panel: x=708..1200, chart area internal                                  -->
  <!-- ══════════════════════════════════════════════════════════════════════════ -->
  <rect x="708" y="82" width="496" height="520" rx="10" fill="#1a1d27" filter="url(#panelShadow)"/>
  <rect x="708" y="82" width="496" height="520" rx="10" fill="none" stroke="#252a36" stroke-width="1"/>

  <!-- Panel title -->
  <text x="724" y="106" font-size="14" font-weight="700" fill="#e2e8f0">First semantic break</text>
  <text x="724" y="121" font-size="10" font-weight="400" fill="#64748b">Appears only after enriching the carrier semantics</text>

  <!-- ═══ CARD 1: Break details ═══ -->
  <rect x="724" y="138" width="464" height="118" rx="8" fill="#161b22" stroke="#252a36" stroke-width="1"/>

  <!-- Semantics badge -->
  <rect x="736" y="150" width="200" height="22" rx="4" fill="#1e293b"/>
  <text x="746" y="165" font-size="10" font-weight="700" fill="#fbbf24">Additive partial activation</text>

  <text x="736" y="192" font-size="10" font-weight="500" fill="#94a3b8">smallest counterexample:</text>
  <text x="874" y="192" font-size="10" font-weight="600" fill="#e2e8f0" font-family="'SF Mono', monospace, 'Inter', sans-serif">(p=2, k=2)</text>

  <text x="736" y="210" font-size="10" font-weight="500" fill="#94a3b8">family:</text>
  <text x="784" y="210" font-size="10" font-weight="600" fill="#e2e8f0" font-family="'SF Mono', monospace, 'Inter', sans-serif">((1, 2),)</text>

  <text x="736" y="228" font-size="10" font-weight="500" fill="#94a3b8">thresholds:</text>
  <text x="808" y="228" font-size="10" font-weight="500" fill="#e2e8f0" font-family="'SF Mono', monospace, 'Inter', sans-serif">{'{'}1,2{'}'}: 2</text>

  <text x="736" y="246" font-size="10" font-weight="500" fill="#94a3b8">old summary:</text>
  <text x="816" y="246" font-size="10" font-weight="500" fill="#64748b" font-family="'SF Mono', monospace, 'Inter', sans-serif">depth=0, completed=[]</text>

  <!-- ═══ CARD 2: Witness states ═══ -->
  <rect x="724" y="270" width="464" height="148" rx="8" fill="#161b22" stroke="#252a36" stroke-width="1"/>
  <text x="736" y="291" font-size="12" font-weight="700" fill="#e2e8f0">Witness states</text>

  <!-- State definitions with monospace -->
  <g font-family="'SF Mono', 'Fira Code', monospace, 'Inter', sans-serif" font-size="10" font-weight="500">
    <text x="736" y="314" fill="#38bdf8">s</text>
    <text x="752" y="314" fill="#64748b">= (0, (-1, -1))</text>
    <text x="900" y="314" fill="#38bdf8">t</text>
    <text x="916" y="314" fill="#64748b">= (0, (-1, 0))</text>
    <text x="1060" y="314" fill="#94a3b8">r</text>
    <text x="1076" y="314" fill="#64748b">= (0, (0, -1))</text>
  </g>

  <!-- Separator line -->
  <line x1="736" y1="326" x2="1176" y2="326" stroke="#252a36" stroke-width="0.5"/>

  <!-- Now / Future comparison -->
  <text x="736" y="346" font-size="10" font-weight="500" fill="#94a3b8">Current outputs (identical):</text>
  <g font-family="'SF Mono', monospace, 'Inter', sans-serif" font-size="10">
    <text x="752" y="364" fill="#64748b">now(s) = ()</text>
    <text x="900" y="364" fill="#64748b">now(t) = ()</text>
    <rect x="1040" y="354" width="40" height="16" rx="3" fill="#0d2818" stroke="#34d399" stroke-width="0.6"/>
    <text x="1048" y="366" fill="#34d399" font-size="8" font-weight="600">same</text>
  </g>

  <text x="736" y="386" font-size="10" font-weight="500" fill="#94a3b8">Future outputs after composition with r (different!):</text>
  <g font-family="'SF Mono', monospace, 'Inter', sans-serif" font-size="10">
    <text x="752" y="404" fill="#64748b">future(s∘r) = ()</text>
    <text x="900" y="404" fill="#f87171" font-weight="600">future(t∘r) = ((1,2),)</text>
    <rect x="1040" y="394" width="44" height="16" rx="3" fill="#2a1520" stroke="#f87171" stroke-width="0.6"/>
    <text x="1046" y="406" fill="#f87171" font-size="8" font-weight="600">differs</text>
  </g>

  <!-- ═══ CARD 3: Interpretation ═══ -->
  <rect x="724" y="432" width="464" height="154" rx="8" fill="url(#breakCardGrad)" stroke="#f87171" stroke-width="0.8" opacity="0.95"/>

  <text x="736" y="456" font-size="12" font-weight="700" fill="#f1f5f9">Interpretation</text>

  <text x="736" y="478" font-size="10.5" font-weight="500" fill="#cbd5e1">The collapse boundary is</text>
  <text x="918" y="478" font-size="10.5" font-weight="700" fill="#fbbf24">semantic, not combinatorial.</text>

  <text x="736" y="498" font-size="10" font-weight="400" fill="#94a3b8">Arbitrary antichains — no matter how large — never break the</text>
  <text x="736" y="512" font-size="10" font-weight="400" fill="#94a3b8">coordinate-tracking collapse under binary completion.</text>

  <text x="736" y="534" font-size="10" font-weight="400" fill="#94a3b8">The first break appears when we add</text>
  <text x="988" y="534" font-size="10" font-weight="600" fill="#fbbf24">partial progress</text>
  <text x="1088" y="534" font-size="10" font-weight="400" fill="#94a3b8">—</text>

  <text x="736" y="548" font-size="10" font-weight="400" fill="#94a3b8">states that agree on current output but diverge after composition.</text>

  <!-- Break type badge -->
  <rect x="736" y="560" width="244" height="18" rx="4" fill="#1e293b"/>
  <text x="746" y="573" font-size="8.5" font-weight="600" fill="#64748b" font-family="'SF Mono', monospace, 'Inter', sans-serif">break_type: coordinate_level_not_hypergraph</text>

  <!-- ══════════════ INSIGHT STRIP (bottom) ══════════════ -->
  <g transform="translate(36, 618)">
    <rect x="0" y="0" width="1168" height="44" rx="6" fill="#161b22" stroke="#1e293b" stroke-width="1"/>

    <!-- Three key stats -->
    <g transform="translate(24, 14)">
      <text x="0" y="0" font-size="9" font-weight="700" fill="#34d399" letter-spacing="0.5">TESTED</text>
      <text x="0" y="16" font-size="16" font-weight="800" fill="#34d399">6,336</text>
      <text x="62" y="16" font-size="10" font-weight="400" fill="#64748b">antichain configs</text>
    </g>

    <line x1="250" y1="8" x2="250" y2="36" stroke="#1e293b" stroke-width="1"/>

    <g transform="translate(274, 14)">
      <text x="0" y="0" font-size="9" font-weight="700" fill="#34d399" letter-spacing="0.5">FAILURES</text>
      <text x="0" y="16" font-size="16" font-weight="800" fill="#34d399">0</text>
      <text x="20" y="16" font-size="10" font-weight="400" fill="#64748b">under binary completion</text>
    </g>

    <line x1="500" y1="8" x2="500" y2="36" stroke="#1e293b" stroke-width="1"/>

    <g transform="translate(524, 14)">
      <text x="0" y="0" font-size="9" font-weight="700" fill="#fbbf24" letter-spacing="0.5">FIRST BREAK</text>
      <text x="0" y="16" font-size="10" font-weight="500" fill="#94a3b8">requires additive partial activation — a richer carrier semantics</text>
    </g>
  </g>

  <!-- ══════════════ VISUAL FLOW ARROW between panels ══════════════ -->
  <g opacity="0.4">
    <line x1="694" y1="320" x2="702" y2="320" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="700" y1="316" x2="706" y2="320" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="700" y1="324" x2="706" y2="320" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Figure label -->
  <text x="52" y="710" font-size="9" font-weight="400" fill="#334155">Figure 3 · Stark: Selective Memory Theory · Runtime Collapse Boundary</text>
</svg>